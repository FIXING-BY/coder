<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Studio Pro</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/material-ocean.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>

    <style>
        :root {
            --bg: #0f111a;
            --surface: #1a1b26;
            --accent: #7aa2f7;
            --success: #9ece6a;
        }

        * { box-sizing: border-box; outline: none; }
        body, html {
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            background-color: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden;
        }

        .app-wrapper { display: flex; flex-direction: column; height: 100vh; }

        .navbar {
            height: 60px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 25px; background: var(--surface);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            flex-shrink: 0;
        }

        .logo { font-weight: 600; color: var(--accent); font-size: 1.1rem; }
        .actions { display: flex; gap: 10px; }

        .btn {
            padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer;
            font-weight: 600; font-family: inherit; transition: 0.2s;
            display: flex; align-items: center; gap: 8px; font-size: 13px;
        }

        .btn-primary { background: var(--success); color: #0f111a; }
        .btn-secondary { background: rgba(255,255,255,0.05); color: white; }

        .editor-area { 
            flex-grow: 1; 
            overflow: hidden; 
        }
        .CodeMirror { height: 100% !important; font-family: 'Fira Code', monospace; font-size: 16px; }

        /* Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            display: none; justify-content: center; align-items: center; z-index: 100;
        }
        .modal { background: var(--surface); padding: 30px; border-radius: 20px; width: 320px; }
        .modal input {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2); color: white; margin: 15px 0;
        }

        /* Yapay Zeka Paneli Stilleri */
        #ai-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        #ai-toggle-btn {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 14px 24px;
            border-radius: 30px;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: 0.3s;
            font-size: 14px;
        }
        #ai-toggle-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.5);
        }
        #ai-panel {
            display: none;
            width: 320px;
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            margin-bottom: 15px;
        }
        .ai-expanded #ai-panel { display: block; }
        .ai-expanded #ai-toggle-btn { display: none; }
        .ai-header { display: flex; justify-content: space-between; color: white; font-weight: bold; margin-bottom: 15px; font-size: 15px; }
        #ai-model-select { 
            width: 100%; padding: 10px; margin-bottom: 15px; background: rgba(0,0,0,0.2); 
            color: white; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; outline: none;
        }
        #ai-prompt { 
            width: 100%; height: 90px; padding: 12px; background: rgba(0,0,0,0.2); 
            color: white; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; 
            margin-bottom: 15px; resize: none; font-family: inherit; outline: none;
        }
        #ai-status { color: var(--accent); font-size: 13px; margin-top: 12px; text-align: center; font-weight: 600;}
    </style>
</head>
<body>

<div class="app-wrapper">
    <div class="navbar">
        <div class="logo">PYTHON STUDIO</div>
        <div class="actions">
            <button class="btn btn-secondary" onclick="openModal()">💾 Kaydet</button>
            <button id="run-btn" class="btn btn-primary" onclick="runInNewWindow()">▶ Çalıştır</button>
        </div>
    </div>

    <div class="editor-area">
        <textarea id="editor"># Sadece sonucu görmek için çalıştır
print("Merhaba Dünya!")
print(50 * 2)</textarea>
    </div>
</div>

<div class="modal-overlay" id="overlay">
    <div class="modal">
        <h3 style="margin:0; color:white;">Dosya Adı</h3>
        <input type="text" id="filename" value="script">
        <div style="display:flex; justify-content: flex-end; gap: 10px;">
            <button class="btn btn-secondary" onclick="closeModal()">İptal</button>
            <button class="btn btn-primary" onclick="downloadFile()">İndir</button>
        </div>
    </div>
</div>

<div id="ai-container">
    <button id="ai-toggle-btn" onclick="toggleAI()">✨ Yapay Zeka Asistanı</button>
    <div id="ai-panel">
        <div class="ai-header">
            <span>🤖 Kod Asistanı</span>
            <button onclick="toggleAI()" style="background:none;border:none;color:rgba(255,255,255,0.5);cursor:pointer;font-size:16px;">✖</button>
        </div>
        <select id="ai-model-select">
            <option value="llama-3.3-70b-versatile">Mini AI (Llama)</option>
            <option value="openai/gpt-oss-120b">Pro AI (GPT-OSS-120b)</option>
        </select>
        <textarea id="ai-prompt" placeholder="Kodu nasıl değiştireyim? Örn: Bu kodu bir hesap makinesi yap."></textarea>
        <button class="btn btn-primary" style="width:100%; justify-content:center;" onclick="askAI()">🚀 Kodu Güncelle</button>
        <div id="ai-status"></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>

<script>
    const editor = CodeMirror.fromTextArea(document.getElementById("editor"), {
        mode: "python", theme: "material-ocean", lineNumbers: true, autoCloseBrackets: true
    });

    let pyodideInstance = null;
    async function initPyodide() { pyodideInstance = await loadPyodide(); }
    initPyodide();

    async function runInNewWindow() {
        if (!pyodideInstance) return alert("Yükleniyor...");
        const code = editor.getValue();
        
        try {
            pyodideInstance.runPython(`import sys, io\nsys.stdout = io.StringIO()`);
            await pyodideInstance.runPythonAsync(code);
            const stdout = pyodideInstance.runPython("sys.stdout.getvalue()");

            const resWin = window.open('', '_blank');
            resWin.document.write(`
                <body style="background:#0f111a; color:#cfc9c2; font-family:monospace; padding:20px; white-space:pre-wrap;">${stdout || 'Sonuç yok.'}</body>
            `);
            resWin.document.close();
        } catch (err) {
            // Hataları Türkçeye Çevirme
            let trErr = err.toString()
                .replace(/Traceback \(most recent call last\):/g, "Hata İzleme Kaydı (son çağrıdan geriye doğru):")
                .replace(/File "<exec>", line (\d+)/g, "$1. satırda hata")
                .replace(/line (\d+)/g, "satır $1")
                .replace(/SyntaxError:/g, "Sözdizimi Hatası (SyntaxError):")
                .replace(/NameError:/g, "İsim Hatası (NameError):")
                .replace(/TypeError:/g, "Tür Hatası (TypeError):")
                .replace(/ValueError:/g, "Değer Hatası (ValueError):")
                .replace(/IndentationError:/g, "Girinti Hatası (IndentationError):")
                .replace(/IndexError:/g, "Dizin Hatası (IndexError):")
                .replace(/KeyError:/g, "Anahtar Hatası (KeyError):")
                .replace(/AttributeError:/g, "Nitelik Hatası (AttributeError):")
                .replace(/ZeroDivisionError:/g, "Sıfıra Bölme Hatası (ZeroDivisionError):");

            const errWin = window.open('', '_blank');
            errWin.document.write(`<body style="background:#1a1b26; color:#f7768e; font-family:monospace; padding:20px; white-space:pre-wrap;">${trErr}</body>`);
            errWin.document.close();
        }
    }

    const overlay = document.getElementById('overlay');
    function openModal() { overlay.style.display = 'flex'; }
    function closeModal() { overlay.style.display = 'none'; }
    function downloadFile() {
        const code = editor.getValue();
        let name = document.getElementById('filename').value || "script";
        if(!name.endsWith('.py')) name += '.py';
        const blob = new Blob([code], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = name; a.click();
        closeModal();
    }

    // --- YAPAY ZEKA SİSTEMİ ---
    const AI_API_KEY = "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";

    function toggleAI() {
        document.getElementById('ai-container').classList.toggle('ai-expanded');
    }

    async function askAI() {
        const promptText = document.getElementById('ai-prompt').value;
        const modelName = document.getElementById('ai-model-select').value;
        const statusDiv = document.getElementById('ai-status');
        const currentCode = editor.getValue();

        if (!promptText.trim()) {
            statusDiv.innerText = "Lütfen bir komut yaz!";
            statusDiv.style.color = "#f7768e";
            return;
        }

        statusDiv.innerText = "Kod yazılıyor, bekle...";
        statusDiv.style.color = "var(--accent)";

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${AI_API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: modelName,
                    messages: [
                        {
                            role: "system",
                            content: "Sen uzman bir Python kodlayıcısısın. Kullanıcının isteğine göre mevcut kodu değiştirip veya yeni kod yazıp YALNIZCA KODU döndürmelisin. Başka hiçbir açıklama, selamlama yapma. Markdown (```python) kullanma, sadece saf çalıştırılabilir kod ver."
                        },
                        {
                            role: "user",
                            content: `Mevcut Kod:\n${currentCode}\n\nKullanıcının İsteği: ${promptText}`
                        }
                    ],
                    temperature: 0.2
                })
            });

            if (!response.ok) {
                const errData = await response.json();
                throw new Error(errData.error?.message || "Sunucu reddetti.");
            }

            const data = await response.json();
            let aiCode = data.choices[0].message.content.trim();

            // AI yanlışlıkla markdown ile kod gönderirse onu temizleme
            if (aiCode.startsWith("```python")) {
                aiCode = aiCode.substring(9).trim();
                if (aiCode.endsWith("```")) aiCode = aiCode.slice(0, -3).trim();
            } else if (aiCode.startsWith("```")) {
                aiCode = aiCode.substring(3).trim();
                if (aiCode.endsWith("```")) aiCode = aiCode.slice(0, -3).trim();
            }

            // Kodu editöre yaz
            editor.setValue(aiCode);
            
            statusDiv.innerText = "Kod başarıyla değiştirildi! ✅";
            statusDiv.style.color = "var(--success)";
            
            // 2 saniye sonra paneli otomatik kapat
            setTimeout(() => { 
                statusDiv.innerText = ""; 
                document.getElementById('ai-prompt').value = ""; 
                toggleAI(); 
            }, 2000);

        } catch (error) {
            statusDiv.innerText = "Hata: " + error.message;
            statusDiv.style.color = "#f7768e";
        }
    }
</script>
</body>
</html>
